id: v2035-edu-002
pillar: education_tech
title: "India-UK Green Skills Partnership"
commitment_text: >
  Establish an India-UK Green Skills Partnership bringing together
  Indian and UK expertise on skills for the green economy.
source_url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
announced: 2025-07-24
owners: [DfE, Ministry of Skill Development and Entrepreneurship (India)]
status: no_public_evidence
status_rationale: >
  No public record of activity, funding or launch under the India-UK
  Green Skills Partnership has been identified since this commitment
  was made.
evidence:
  - date: 2025-07-24
    url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
    source_type: gov_uk
    summary: "Vision 2035 committed both governments to an India-UK Green Skills Partnership bringing together Indian and UK expertise."
suggested_pq: >
  To ask His Majesty's Government what progress has been made in
  establishing the India-UK Green Skills Partnership committed to under
  Vision 2035.
last_reviewed: 2026-07-03
