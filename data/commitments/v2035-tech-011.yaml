id: v2035-tech-011
pillar: technology
title: "6G collaboration at ITU and 3GPP"
commitment_text: >
  Work together in international standards fora — the ITU and 3GPP —
  to shape 6G development.
source_url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
announced: 2025-07-24
owners: [DSIT, DoT (India)]
status: no_public_evidence
status_rationale: >
  No public record of joint UK-India submissions, statements or
  coordinated positions at ITU or 3GPP has been identified since this
  commitment was made.
evidence:
  - date: 2025-07-24
    url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
    source_type: gov_uk
    summary: "Vision 2035 committed both governments to work together at international fora including the ITU and 3GPP on 6G."
suggested_pq: >
  To ask His Majesty's Government what joint UK-India positions or
  submissions have been made at the ITU or 3GPP on 6G standards since
  July 2025.
last_reviewed: 2026-07-03
