id: v2035-trade-004
pillar: trade_digital
title: "Supply Chain Resilience dialogue mechanism"
commitment_text: >
  Hold regular dialogue mechanisms on supply chain resilience between
  the UK and India.
source_url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
announced: 2025-07-24
owners: [DBT (UK), Ministry of Commerce and Industry (India)]
status: no_public_evidence
status_rationale: >
  No public record of a convened UK-India Supply Chain Resilience
  dialogue meeting has been identified since this commitment was made.
evidence:
  - date: 2025-07-24
    url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
    source_type: gov_uk
    summary: "Vision 2035 committed both governments to regular dialogue mechanisms on supply chain resilience."
suggested_pq: >
  To ask His Majesty's Government when the UK-India Supply Chain
  Resilience dialogue committed to under Vision 2035 last met, and what
  it discussed.
last_reviewed: 2026-07-03
