id: v2035-trade-005
pillar: trade_digital
title: "Strategic Export & Technology Cooperation Dialogues"
commitment_text: >
  Hold regular Strategic Export & Technology Cooperation Dialogues
  between the UK and India.
source_url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
announced: 2025-07-24
owners: [FCDO, Ministry of External Affairs (India)]
status: no_public_evidence
status_rationale: >
  No public record of a convened Strategic Export & Technology
  Cooperation Dialogue has been identified since this commitment was
  made.
evidence:
  - date: 2025-07-24
    url: https://www.gov.uk/government/publications/india-uk-vision-2035/india-uk-vision-2035
    source_type: gov_uk
    summary: "Vision 2035 committed both governments to hold regular Strategic Export & Technology Cooperation Dialogues."
suggested_pq: >
  To ask His Majesty's Government when the Strategic Export & Technology
  Cooperation Dialogue with India committed to under Vision 2035 has
  met, and what outcomes it has produced.
last_reviewed: 2026-07-03
